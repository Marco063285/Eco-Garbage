# =====================================================================
# Render Blueprint — deploys backend + frontend in one click.
# After connecting your GitHub repo, go to Render > Blueprints > New
# Blueprint Instance, pick this repo, and Render will create both
# services from this file.
# =====================================================================

services:
  # ---------- Backend (Node Web Service) -------------------------------
  - type: web
    name: eco-garbage-backend
    runtime: node
    plan: free
    region: frankfurt          # change to oregon/singapore if closer to you
    rootDir: Eco-Garbage/backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_FILE_SIZE
        value: "5242880"
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false             # set manually in Render dashboard (Atlas SRV URI)
      - key: FRONTEND_URL
        sync: false             # set after frontend is deployed (e.g. https://eco-garbage-frontend.onrender.com)
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_FROM
        sync: false

  # ---------- Frontend (Static Site) -----------------------------------
  - type: web
    name: eco-garbage-frontend
    runtime: static
    plan: free
    rootDir: Eco-Garbage/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        sync: false             # set to the backend URL after backend is created
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
